name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:

jobs:
  sonar-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  build-and-scan:
    runs-on: ubuntu-latest
    needs: sonar-scan

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false                        # build only, don't push yet
          tags: ajizzle404/vuln-lab:${{ github.sha }}
          load: true                         # loads into local Docker daemon for Trivy

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "ajizzle404/vuln-lab:${{ github.sha }}"
          format: table
          exit-code: "1"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true

      - name: Push image (only if Trivy passes)
        if: success()
        run: docker push ajizzle404/vuln-lab:${{ github.sha }}